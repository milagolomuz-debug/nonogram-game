    function currentPuzzleIndex() {
      return currentPack.puzzles.findIndex((nextPuzzle) => nextPuzzle.id === puzzle.id);
    }

    function loadRelativePuzzle(delta) {
      const nextIndex = currentPuzzleIndex() + delta;
      const nextPuzzle = currentPack.puzzles[nextIndex];
      if (!nextPuzzle) return;
      loadPuzzle(currentPack, nextPuzzle);
    }

    function loadPuzzle(pack, nextPuzzle) {
      pauseTimer();
      saveProgress();
      currentPack = pack;
      puzzle = nextPuzzle;
      refreshPuzzleRefs();
      resetRuntimeState();
      loadProgress();
      renderPalette();
      renderIndexLabels();
      updateHistoryButtons();
      update();
      showGame();
    }

    function textColorFor(hex) {
      const value = hex.replace("#", "");
      const red = parseInt(value.slice(0, 2), 16);
      const green = parseInt(value.slice(2, 4), 16);
      const blue = parseInt(value.slice(4, 6), 16);
      const luminance = (red * 299 + green * 587 + blue * 114) / 1000;
      return luminance < 135 ? "#fff" : "#111";
    }

    function buildClues(lines) {
      return lines.map((line) => {
        const clues = [];
        let current = null;
        let count = 0;
        let start = 0;

        for (let index = 0; index < line.length; index += 1) {
          const cell = line[index];
          if (cell && cell === current) {
            count += 1;
          } else {
            if (current) clues.push({ color: current, count, start, end: index - 1 });
            current = cell;
            start = index;
            count = cell ? 1 : 0;
          }
        }

        if (current) clues.push({ color: current, count, start, end: line.length - 1 });
        return clues;
      });
    }

    let rowClues = buildClues(puzzle.solution);
    let colClues = buildClues(
      Array.from({ length: puzzle.width }, (_, col) => puzzle.solution.map((row) => row[col])),
    );
    let clueCols = 8;
    let clueRows = 11;

    function configurePuzzleGeometry() {
      clueCols = puzzle.width >= 30 ? 9 : 8;
      clueRows = puzzle.height >= 45 ? 12 : 11;
      const cell = puzzle.width >= 30 ? 9.35 : 11;
      const solvedCell = puzzle.width >= 30 ? 7.33 : 8.85;
      root.style.setProperty("--cn-cols", puzzle.width);
      root.style.setProperty("--cn-rows", puzzle.height);
      root.style.setProperty("--cn-clue-cols", clueCols);
      root.style.setProperty("--cn-clue-rows", clueRows);
      root.style.setProperty("--cn-cell", `${cell}px`);
      root.style.setProperty("--cn-solved-cell", `${solvedCell}px`);
      root.style.setProperty("--cn-clue-left", `${clueCols * cell}px`);
      root.style.setProperty("--cn-clue-top", `${clueRows * cell}px`);
      root.style.setProperty("--cn-grid-w", `${puzzle.width * cell}px`);
      root.style.setProperty("--cn-grid-h", `${puzzle.height * cell}px`);
      root.style.setProperty("--cn-solved-w", `${puzzle.width * solvedCell}px`);
      root.style.setProperty("--cn-solved-h", `${puzzle.height * solvedCell}px`);
      root.style.setProperty("--cn-board-w", `${(clueCols + puzzle.width) * cell}px`);
      root.style.setProperty("--cn-board-h", `${(clueRows + puzzle.height) * cell}px`);
    }

    function refreshPuzzleRefs() {
      colorById = Object.fromEntries(puzzle.palette.map((color) => [color.id, color]));
      storageKey = `color-nonogram:${puzzle.id}`;
      rowClues = buildClues(puzzle.solution);
      colClues = buildClues(
        Array.from({ length: puzzle.width }, (_, col) => puzzle.solution.map((row) => row[col])),
      );
      configurePuzzleGeometry();
    }

    refreshPuzzleRefs();

    function isCellCorrect(cell, solutionCell) {
      return solutionCell ? cell === solutionCell : cell === "dot";
    }

    function isLineSolved(kind, index) {
      if (kind === "row") {
        return state.cells[index].every((cell, col) => isCellCorrect(cell, puzzle.solution[index][col]));
      }

      return state.cells.every((row, rowIndex) => isCellCorrect(row[index], puzzle.solution[rowIndex][index]));
    }

    function isSolved() {
      return state.cells.every((row, rowIndex) =>
        row.every((cell, colIndex) => isCellCorrect(cell, puzzle.solution[rowIndex][colIndex])),
      );
    }

    function coloredLineIsCorrect(kind, index) {
      if (kind === "row") {
        if (!puzzle.solution[index].some(Boolean)) return false;
        return puzzle.solution[index].every((solutionCell, col) => {
          const cell = state.cells[index][col];
          return solutionCell ? cell === solutionCell : !cell || cell === "dot";
        });
      }

      if (!puzzle.solution.some((row) => row[index])) return false;
      return puzzle.solution.every((row, rowIndex) => {
        const solutionCell = row[index];
        const cell = state.cells[rowIndex][index];
        return solutionCell ? cell === solutionCell : !cell || cell === "dot";
      });
    }

    function lineLengthFor(className) {
      return className === "cn-clue-row" ? puzzle.width : puzzle.height;
    }

    function setLineDot(className, lineIndex, position) {
      if (position < 0 || position >= lineLengthFor(className)) return;
      const row = className === "cn-clue-row" ? lineIndex : position;
      const col = className === "cn-clue-row" ? position : lineIndex;
      if (!state.cells[row][col]) state.cells[row][col] = "dot";
    }

    function setLineDotRange(className, lineIndex, start, end) {
      const from = Math.max(0, start);
      const to = Math.min(lineLengthFor(className) - 1, end);
      for (let position = from; position <= to; position += 1) {
        setLineDot(className, lineIndex, position);
      }
    }

    function autoDotSolvedClueGaps() {
      const applyLine = (className, line, lineIndex) => {
        const solved = line.map((clue) => isClueSolved(className, lineIndex, clue));
        const length = lineLengthFor(className);

        line.forEach((clue, clueIndex) => {
          if (!solved[clueIndex]) return;

          if (clueIndex === 0) setLineDotRange(className, lineIndex, 0, clue.start - 1);
          if (clueIndex === line.length - 1) setLineDotRange(className, lineIndex, clue.end + 1, length - 1);

          if (line[clueIndex - 1]?.color === clue.color) setLineDot(className, lineIndex, clue.start - 1);
          if (line[clueIndex + 1]?.color === clue.color) setLineDot(className, lineIndex, clue.end + 1);
        });

        for (let clueIndex = 0; clueIndex < line.length - 1; clueIndex += 1) {
          if (solved[clueIndex] && solved[clueIndex + 1]) {
            setLineDotRange(className, lineIndex, line[clueIndex].end + 1, line[clueIndex + 1].start - 1);
          }
        }
      };

      rowClues.forEach((line, rowIndex) => applyLine("cn-clue-row", line, rowIndex));
      colClues.forEach((line, colIndex) => applyLine("cn-clue-col", line, colIndex));
    }

    function autoDotCompletedLines() {
      for (let row = 0; row < puzzle.height; row += 1) {
        if (coloredLineIsCorrect("row", row)) {
          for (let col = 0; col < puzzle.width; col += 1) {
            if (!puzzle.solution[row][col] && !state.cells[row][col]) state.cells[row][col] = "dot";
          }
        }
      }

      for (let col = 0; col < puzzle.width; col += 1) {
        if (coloredLineIsCorrect("col", col)) {
          for (let row = 0; row < puzzle.height; row += 1) {
            if (!puzzle.solution[row][col] && !state.cells[row][col]) state.cells[row][col] = "dot";
          }
        }
      }
    }

    function isClueSolved(className, lineIndex, clue) {
      if (className === "cn-clue-row") {
        for (let col = clue.start; col <= clue.end; col += 1) {
          if (state.cells[lineIndex][col] !== clue.color) return false;
        }
        if (clue.start > 0 && state.cells[lineIndex][clue.start - 1] === clue.color) return false;
        if (clue.end < puzzle.width - 1 && state.cells[lineIndex][clue.end + 1] === clue.color) return false;
        return true;
      }

      for (let row = clue.start; row <= clue.end; row += 1) {
        if (state.cells[row][lineIndex] !== clue.color) return false;
      }
      if (clue.start > 0 && state.cells[clue.start - 1][lineIndex] === clue.color) return false;
      if (clue.end < puzzle.height - 1 && state.cells[clue.end + 1][lineIndex] === clue.color) return false;
      return true;
    }

    function clueKey(className, lineIndex, clue) {
      return `${className}:${lineIndex}:${clue.start}:${clue.end}:${clue.color}`;
    }

    function renderAllClues() {
      renderClue(byId("cn-row-clues"), rowClues, "cn-clue-row");
      renderClue(byId("cn-col-clues"), colClues, "cn-clue-col");
    }

    function syncClueDoneState(delay = 500) {
      [
        ["cn-clue-row", rowClues],
        ["cn-clue-col", colClues],
      ].forEach(([className, clueLines]) => {
        clueLines.forEach((line, lineIndex) => {
          line.forEach((clue) => {
            const key = clueKey(className, lineIndex, clue);
            const solved = isClueSolved(className, lineIndex, clue);

            if (!solved) {
              window.clearTimeout(state.clueTimers.get(key));
              state.clueTimers.delete(key);
              state.clueDone.delete(key);
              return;
            }

            if (state.clueDone.has(key) || state.clueTimers.has(key)) return;
            state.clueTimers.set(
              key,
              window.setTimeout(() => {
                state.clueTimers.delete(key);
                if (isClueSolved(className, lineIndex, clue)) {
                  state.clueDone.add(key);
                  renderAllClues();
                }
              }, delay),
            );
          });
        });
      });
    }

    function clearClueDoneState() {
      state.clueTimers.forEach((timer) => window.clearTimeout(timer));
      state.clueTimers.clear();
      state.clueDone.clear();
    }

    function renderClue(container, clues, className) {
      container.innerHTML = "";
      clues.forEach((line, index) => {
        const isHot =
          (className === "cn-clue-row" && state.currentRow === index) ||
          (className === "cn-clue-col" && state.currentCol === index);
        const item = document.createElement("div");
        item.className = `${className}${isHot ? " cn-hot" : ""}`;

        const visibleClues = className === "cn-clue-row" ? line.slice(-clueCols) : line.slice(-clueRows);
        visibleClues.forEach((clue) => {
          const chip = document.createElement("span");
          const clueColor = colorById[clue.color].color;
          const isDone = state.clueDone.has(clueKey(className, index, clue));
          chip.className = `cn-chip${clue.count >= 10 ? " cn-two-digit" : ""}${isDone ? " cn-done" : ""}`;
          chip.style.setProperty("--cn-clue-color", clueColor);
          chip.style.background = clueColor;
          chip.style.color = textColorFor(clueColor);
          chip.textContent = clue.count;
          item.appendChild(chip);
        });

        container.appendChild(item);
      });
    }

    function renderPalette() {
      const palette = byId("cn-palette");
      palette.innerHTML = "";
      const items = document.createElement("div");
      items.className = "cn-palette-items";
      palette.appendChild(items);
      palette.classList.toggle("cn-solved-nav", state.solved);
      if (state.solved) {
        palette.classList.remove("cn-hidden");
        const index = currentPuzzleIndex();
        const buttons = [
          { label: "Previous", delta: -1, disabled: index <= 0 },
          { label: "Next", delta: 1, disabled: index < 0 || index >= currentPack.puzzles.length - 1 },
        ];
        buttons.forEach((item) => {
          const button = document.createElement("button");
          button.className = "cn-solved-nav-button";
          button.type = "button";
          const arrow =
            '<svg viewBox="0 0 13 22" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11 2L2 11L11 20" stroke="#fffaf0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
          button.innerHTML =
            item.delta < 0
              ? `${arrow}<span>${item.label}</span>`
              : `<span>${item.label}</span>${arrow.replace('viewBox="0 0 13 22"', 'viewBox="0 0 13 22" style="transform: scaleX(-1)"')}`;
          button.disabled = item.disabled;
          button.addEventListener("click", () => loadRelativePuzzle(item.delta));
          items.appendChild(button);
        });
        renderPaletteButton();
        return;
      }
      palette.classList.toggle("cn-hidden", state.paletteHidden);

      puzzle.palette.forEach((color) => {
        const swatch = document.createElement("button");
        swatch.className = `cn-swatch${state.activeColor === color.id ? " cn-active" : ""}`;
        swatch.type = "button";
        swatch.style.background = color.color;
        swatch.setAttribute("aria-label", color.id);
        swatch.addEventListener("click", () => {
          state.activeColor = color.id;
          renderPalette();
        });
        items.appendChild(swatch);
      });
      renderPaletteButton();
    }

    function renderModeButton() {
      markModeButton.classList.toggle("cn-marking-active", state.markMode);
      markModeButton.innerHTML = state.markMode ? markModeActiveIcon : markModeDefaultIcon;
    }

    function paletteActiveIcon(color) {
      return `<svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10.9375 2C9.16983 2 7.44186 2.52418 5.9721 3.50624C4.50233 4.48831 3.35679 5.88415 2.68033 7.51727C2.00387 9.15038 1.82688 10.9474 2.17174 12.6811C2.51659 14.4148 3.36781 16.0073 4.61774 17.2573C5.86767 18.5072 7.46018 19.3584 9.19388 19.7033C10.9276 20.0481 12.7246 19.8711 14.3577 19.1947C15.9909 18.5182 17.3867 17.3727 18.3688 15.9029C19.3508 14.4331 19.875 12.7052 19.875 10.9375C19.8725 8.5679 18.9301 6.29606 17.2545 4.6205C15.5789 2.94493 13.3071 2.0025 10.9375 2Z" fill="${color}"/></svg>`;
    }

    function renderPaletteButton() {
      if (state.solved) {
        paletteButton.innerHTML = paletteDefaultIcon;
        return;
      }
      if (!state.paletteHidden) {
        paletteButton.innerHTML = paletteDefaultIcon;
        return;
      }
      const color = colorById[state.paletteButtonColor]?.color || colorById[state.activeColor]?.color || "#f6f4ed";
      paletteButton.innerHTML = paletteActiveIcon(color);
    }

    function togglePalette() {
      if (state.solved) return;
      if (!state.paletteHidden) {
        state.paletteButtonColor = state.activeColor;
        state.paletteHidden = true;
      } else {
        state.paletteHidden = false;
      }
      byId("cn-palette").classList.toggle("cn-hidden", state.paletteHidden);
      renderPaletteButton();
      saveProgress();
    }

    function setPointerCell(rowIndex, colIndex) {
      state.currentRow = rowIndex;
      state.currentCol = colIndex;
    }

    function cloneCells() {
      return state.cells.map((row) => [...row]);
    }

    function cloneMarks() {
      return state.marks.map((row) => [...row]);
    }

    function updateHistoryButtons() {
      const undoButton = byId("cn-undo");
      const redoButton = byId("cn-redo");
      undoButton.disabled = state.solved || state.undoStack.length === 0;
      redoButton.disabled = state.solved || state.redoStack.length === 0;
      undoButton.classList.toggle("cn-muted", undoButton.disabled);
      redoButton.classList.toggle("cn-muted", redoButton.disabled);
    }

    function pushHistory() {
      state.undoStack.push(cloneCells());
      if (state.undoStack.length > 80) state.undoStack.shift();
      state.redoStack = [];
      updateHistoryButtons();
    }

    function restoreCells(cells) {
      state.cells = cells.map((row) => [...row]);
      state.showErrors = false;
      update();
      updateHistoryButtons();
    }

    function undo() {
      if (!state.undoStack.length) return;
      state.redoStack.push(cloneCells());
      restoreCells(state.undoStack.pop());
    }

    function redo() {
      if (!state.redoStack.length) return;
      state.undoStack.push(cloneCells());
      restoreCells(state.redoStack.pop());
    }

    function nextCellValue(cell) {
      if (!cell) return state.activeColor;
      if (cell === "dot") return null;
      return "dot";
    }

    function paintCell(rowIndex, colIndex) {
      if (state.solved) return;
      const baseCell = state.gestureCellsBase?.[rowIndex]?.[colIndex];
      const isStartCell = state.drawStart?.row === rowIndex && state.drawStart?.col === colIndex;
      if (baseCell && !isStartCell) return;
      state.cells[rowIndex][colIndex] = state.drawValue;
    }

    function markCell(rowIndex, colIndex) {
      state.marks[rowIndex][colIndex] = state.markValue;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function cellSizePx() {
      return Number.parseFloat(getComputedStyle(root).getPropertyValue("--cn-cell")) || 11;
    }

    function mergeUpdateOptions(current, next) {
      return {
        ...(current || {}),
        ...(next || {}),
        resolveLines: current?.resolveLines === false || next?.resolveLines === false ? false : next?.resolveLines,
      };
    }

    function requestVisualUpdate(options = {}) {
      state.pendingUpdateOptions = mergeUpdateOptions(state.pendingUpdateOptions, options);
      if (state.updateFrame) return;
      state.updateFrame = requestAnimationFrame(() => {
        const nextOptions = state.pendingUpdateOptions || {};
        state.updateFrame = null;
        state.pendingUpdateOptions = null;
        update(nextOptions);
      });
    }

    function dominantAxis(event) {
      const dx = event.clientX - state.startX;
      const dy = event.clientY - state.startY;
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);
      if (Math.max(absX, absY) < cellSizePx() * 1.15) return null;
      if (absX > absY * 1.35) return "row";
      if (absY > absX * 1.35) return "col";
      return null;
    }

    function quantizedOffset(delta) {
      const step = cellSizePx() * 1.75;
      const abs = Math.abs(delta);
      if (abs < step) return 0;
      return Math.sign(delta) * Math.floor(abs / step);
    }

    function freeCellFromPointer(event, origin) {
      const step = cellSizePx() * 1.18;
      const rowOffset = Math.trunc((event.clientY - state.startY) / step);
      const colOffset = Math.trunc((event.clientX - state.startX) / step);
      return {
        row: clamp(origin.row + rowOffset, 0, puzzle.height - 1),
        col: clamp(origin.col + colOffset, 0, puzzle.width - 1),
      };
    }

    function relativeCellFromPointer(event, origin) {
      const axis = state.gestureAxis;
      const rowOffset = axis === "col" ? quantizedOffset(event.clientY - state.startY) : 0;
      const colOffset = axis === "row" ? quantizedOffset(event.clientX - state.startX) : 0;
      return {
        row: clamp(origin.row + rowOffset, 0, puzzle.height - 1),
        col: clamp(origin.col + colOffset, 0, puzzle.width - 1),
      };
    }

    function paintPath(fromCell, toCell) {
      if (!fromCell || !toCell || state.solved || state.drawValue === undefined) return;

      if (!state.drawAxis && state.gestureAxis) state.drawAxis = state.gestureAxis;
      if (state.gestureCellsBase) state.cells = state.gestureCellsBase.map((row) => [...row]);

      const target = { row: toCell.row, col: toCell.col };
      if (state.drawAxis === "row") target.row = state.drawStart.row;
      if (state.drawAxis === "col") target.col = state.drawStart.col;

      if (state.drawAxis === "row") {
        const from = Math.min(state.drawStart.col, target.col);
        const to = Math.max(state.drawStart.col, target.col);
        for (let col = from; col <= to; col += 1) paintCell(state.drawStart.row, col);
      } else if (state.drawAxis === "col") {
        const from = Math.min(state.drawStart.row, target.row);
        const to = Math.max(state.drawStart.row, target.row);
        for (let row = from; row <= to; row += 1) paintCell(row, state.drawStart.col);
      } else {
        paintCell(target.row, target.col);
      }

      state.lastCell = target;
      setPointerCell(target.row, target.col);
      state.changedDuringGesture = true;
      requestVisualUpdate({ resolveLines: false });
    }

    function markPath(fromCell, toCell) {
      if (!fromCell || !toCell) return;
      if (!state.drawAxis && state.gestureAxis) state.drawAxis = state.gestureAxis;
      if (state.gestureMarksBase) state.marks = state.gestureMarksBase.map((row) => [...row]);

      const target = { row: toCell.row, col: toCell.col };
      if (state.drawAxis === "row") target.row = state.drawStart.row;
      if (state.drawAxis === "col") target.col = state.drawStart.col;

      if (state.drawAxis === "row") {
        const from = Math.min(state.drawStart.col, target.col);
        const to = Math.max(state.drawStart.col, target.col);
        for (let col = from; col <= to; col += 1) markCell(state.drawStart.row, col);
      } else if (state.drawAxis === "col") {
        const from = Math.min(state.drawStart.row, target.row);
        const to = Math.max(state.drawStart.row, target.row);
        for (let row = from; row <= to; row += 1) markCell(row, state.drawStart.col);
      } else {
        markCell(target.row, target.col);
      }

      state.lastCell = target;
      setPointerCell(target.row, target.col);
      requestVisualUpdate({ resolveLines: false });
    }

    function syncHotCell(prevRow, prevCol) {
      const grid = byId("cn-grid");
      const previous = grid.querySelector(`[data-row="${prevRow}"][data-col="${prevCol}"]`);
      const current = grid.querySelector(`[data-row="${state.currentRow}"][data-col="${state.currentCol}"]`);
      if (previous) previous.classList.remove("cn-hot");
      if (current) current.classList.add("cn-hot");
    }

    function moveCross(toRow, toCol) {
      const prevRow = state.currentRow;
      const prevCol = state.currentCol;
      setPointerCell(toRow, toCol);
      renderCross();
      syncHotCell(prevRow, prevCol);
    }

    function cellRunKey(cell) {
      if (!cell) return "empty";
      if (cell === "dot") return "dot";
      return cell;
    }

    function sameRunKind(cell, key) {
      if (key === "empty") return !cell;
      if (key === "dot") return cell === "dot";
      return cell === key;
    }

    function countRun(rowIndex, colIndex, axis) {
      const key = cellRunKey(state.cells[rowIndex][colIndex]);
      let count = 1;

      if (axis === "row") {
        for (let col = colIndex - 1; col >= 0 && sameRunKind(state.cells[rowIndex][col], key); col -= 1) count += 1;
        for (let col = colIndex + 1; col < puzzle.width && sameRunKind(state.cells[rowIndex][col], key); col += 1) count += 1;
        return count;
      }

      for (let row = rowIndex - 1; row >= 0 && sameRunKind(state.cells[row][colIndex], key); row -= 1) count += 1;
      for (let row = rowIndex + 1; row < puzzle.height && sameRunKind(state.cells[row][colIndex], key); row += 1) count += 1;
      return count;
    }

    function handleTap(row, col) {
      const targetRow = state.currentRow === null ? row : state.currentRow;
      const targetCol = state.currentCol === null ? col : state.currentCol;
      if (state.markMode) {
        state.marks[targetRow][targetCol] = !state.marks[targetRow][targetCol];
        update({ resolveLines: false });
        return;
      }
      pushHistory();
      setPointerCell(targetRow, targetCol);
      const nextValue = nextCellValue(state.cells[targetRow][targetCol]);
      state.cells[targetRow][targetCol] = nextValue;
      state.armedValue = nextValue;
      state.showErrors = false;
      state.changedDuringGesture = true;
      update({ resolveLines: false });
    }

    function cellFromPoint(event) {
      const element = document.elementFromPoint(event.clientX, event.clientY);
      const cell = element && element.closest ? element.closest(".cn-cell") : null;
      if (!cell || !root.contains(cell)) return null;
      return {
        row: Number(cell.dataset.row),
        col: Number(cell.dataset.col),
      };
    }

    function renderGrid() {
      const grid = byId("cn-grid");
      grid.innerHTML = "";
      const nextRenderedCellKeys = Array.from({ length: puzzle.height }, () => Array(puzzle.width).fill(""));

      state.cells.forEach((row, rowIndex) => {
        row.forEach((cell, colIndex) => {
          const button = document.createElement("button");
          const displayCell = state.solved ? puzzle.solution[rowIndex][colIndex] : cell;
          const filled = displayCell && displayCell !== "dot";
          const lightFilled = filled && textColorFor(colorById[displayCell].color) === "#111";
          const wrong =
            !state.solved &&
            state.showErrors &&
            ((cell && cell !== "dot" && cell !== puzzle.solution[rowIndex][colIndex]) ||
              (cell === "dot" && puzzle.solution[rowIndex][colIndex]));
          const hot = state.currentRow === rowIndex && state.currentCol === colIndex;
          const lineHot = state.currentRow === rowIndex || state.currentCol === colIndex;
          const majorRight = (colIndex + 1) % 5 === 0 && colIndex + 1 < puzzle.width;
          const majorBottom = (rowIndex + 1) % 5 === 0 && rowIndex + 1 < puzzle.height;
          const hasMark = !state.solved && state.marks[rowIndex][colIndex];
          const cellKey = `${displayCell || ""}:${hasMark ? "mark" : ""}`;
          const changed = state.renderedCellKeys && state.renderedCellKeys[rowIndex]?.[colIndex] !== cellKey;
          nextRenderedCellKeys[rowIndex][colIndex] = cellKey;
          button.className = `cn-cell${majorRight ? " cn-major-right" : ""}${majorBottom ? " cn-major-bottom" : ""}${filled ? " cn-filled" : ""}${lightFilled ? " cn-light-filled" : ""}${displayCell === "dot" ? " cn-dot" : ""}${hasMark ? " cn-mark" : ""}${wrong ? " cn-wrong" : ""}${lineHot && !state.solved ? " cn-line-hot" : ""}${hot && !state.solved ? " cn-hot" : ""}${changed && !state.solved ? " cn-just-changed" : ""}${state.solved && filled ? " cn-reveal" : ""}`;
          button.type = "button";
          button.dataset.row = rowIndex;
          button.dataset.col = colIndex;
          button.style.setProperty("--cn-i", rowIndex + colIndex);
          button.style.background = displayCell && displayCell !== "dot" ? colorById[displayCell].color : "#fffaf0";
          button.setAttribute("aria-label", `${rowIndex + 1}:${colIndex + 1}`);

          grid.appendChild(button);
        });
      });
      state.renderedCellKeys = nextRenderedCellKeys;
    }

    function renderSolvedState() {
      app.classList.toggle("cn-solved", state.solved);
      byId("cn-solved-title").textContent = puzzle.title.toUpperCase();
      byId("cn-solved-time").textContent = formatElapsed(getElapsedMs());
      byId("cn-solved-width-label").textContent = puzzle.width;
      byId("cn-solved-height-label").textContent = puzzle.height;
      byId("cn-mark-mode").disabled = state.solved;
      paletteButton.disabled = state.solved;
      byId("cn-review").disabled = state.solved;
      updateHistoryButtons();
    }

    function applyLineResolution(clueDelay = 0) {
      autoDotSolvedClueGaps();
      autoDotCompletedLines();
      syncClueDoneState(clueDelay);
    }

    function scheduleLineResolution() {
      window.clearTimeout(state.resolveTimer);
      state.resolveTimer = window.setTimeout(() => {
        state.resolveTimer = null;
        applyLineResolution(0);
        update({ resolveLines: false });
      }, 500);
    }

    function update(options = {}) {
      const shouldResolveLines = options.resolveLines !== false;
      if (shouldResolveLines) applyLineResolution(options.clueDelay ?? 0);
      state.solved = isSolved();
      if (state.solved) pauseTimer();
      renderAllClues();
      renderGrid();
      renderCross();
      renderModeButton();
      renderSolvedState();
      renderPalette();

      saveProgress();
    }

    function renderCross() {
      const row = byId("cn-cross-row");
      const col = byId("cn-cross-col");
      const rowCount = byId("cn-cross-row-count");
      const colCount = byId("cn-cross-col-count");
      const clueH = clueRows;

      if (state.currentRow === null || state.currentCol === null) {
        row.style.display = "none";
        col.style.display = "none";
        rowCount.style.display = "none";
        colCount.style.display = "none";
        return;
      }

      row.style.display = "block";
      col.style.display = "block";
      rowCount.style.display = "grid";
      colCount.style.display = "grid";
      row.style.top = `calc(var(--cn-cell) * ${clueH + state.currentRow} - var(--cn-highlight-stroke))`;
      col.style.left = `calc(var(--cn-cell) * ${clueCols + state.currentCol} - var(--cn-highlight-stroke))`;
      rowCount.textContent = countRun(state.currentRow, state.currentCol, "row");
      colCount.textContent = countRun(state.currentRow, state.currentCol, "col");
      rowCount.style.left = `calc(var(--cn-cell) * ${clueCols + puzzle.width} - 2px)`;
      rowCount.style.top = `calc(var(--cn-cell) * ${clueH + state.currentRow} + var(--cn-cell) / 2)`;
      rowCount.style.transform = "translate(-100%, -50%)";
      colCount.style.left = `calc(var(--cn-cell) * ${clueCols + state.currentCol} + var(--cn-cell) / 2)`;
      colCount.style.top = `calc(var(--cn-cell) * ${clueH + puzzle.height} - 2px)`;
      colCount.style.transform = "translate(-50%, -100%)";
    }

    function renderIndexLabels() {
      const bottom = byId("cn-bottom-numbers");
      const side = byId("cn-side-numbers");
      bottom.innerHTML = "";
      side.innerHTML = "";

      for (let col = 5; col < puzzle.width; col += 5) {
        const label = document.createElement("span");
        label.className = "cn-index-label";
        label.textContent = col;
        label.style.left = `calc(var(--cn-cell) * ${clueCols + col})`;
        label.style.top = `calc(var(--cn-cell) * ${clueRows + puzzle.height} - 7px)`;
        label.style.transform = "translateX(-50%)";
        bottom.appendChild(label);
      }

      for (let row = 5; row < puzzle.height; row += 5) {
        const label = document.createElement("span");
        label.className = "cn-index-label";
        label.textContent = row;
        label.style.left = `calc(var(--cn-cell) * ${clueCols + puzzle.width} - 2px)`;
        label.style.top = `calc(var(--cn-cell) * ${clueRows + row} + var(--cn-cell) / 2)`;
        label.style.transform = "translate(-100%, -50%)";
        side.appendChild(label);
      }
    }

    function formatElapsed(ms) {
      const total = Math.max(0, Math.floor(ms / 1000));
      const hours = Math.floor(total / 3600);
      const minutes = Math.floor((total % 3600) / 60);
      const seconds = total % 60;
      return [hours, minutes, seconds].map((value) => String(value).padStart(2, "0")).join(":");
    }

    function getElapsedMs() {
      if (!state.timerRunning || state.timerStartedAt === null) return state.elapsedMs;
      return state.elapsedMs + Date.now() - state.timerStartedAt;
    }

    function renderTimer() {
      const timer = byId("cn-menu-time");
      if (timer) timer.textContent = formatElapsed(getElapsedMs());
    }

    function startTimer() {
      if (state.timerRunning || state.solved) return;
      state.timerRunning = true;
      state.timerStartedAt = Date.now();
      window.clearInterval(state.timerInterval);
      state.timerInterval = window.setInterval(saveProgress, 10000);
    }

    function pauseTimer() {
      if (!state.timerRunning) {
        renderTimer();
        return;
      }
      state.elapsedMs = getElapsedMs();
      state.timerRunning = false;
      state.timerStartedAt = null;
      window.clearInterval(state.timerInterval);
      renderTimer();
      saveProgress();
    }

    function saveProgress() {
      const data = {
        cells: state.cells,
        marks: state.marks,
        activeColor: state.activeColor,
        paletteHidden: state.paletteHidden,
        paletteButtonColor: state.paletteButtonColor,
        currentRow: state.currentRow,
        currentCol: state.currentCol,
        elapsedMs: getElapsedMs(),
        solved: state.solved || isSolved(),
      };
      storageSet(storageKey, JSON.stringify(data));
    }

    function loadProgress() {
      try {
        const raw = storageGet(storageKey);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (!Array.isArray(data.cells)) return;
        state.cells = Array.from({ length: puzzle.height }, (_, rowIndex) =>
          Array.from({ length: puzzle.width }, (_, col) => {
            const row = data.cells[rowIndex];
            const cell = row && row[col];
            return cell === "dot" || colorById[cell] ? cell : null;
          }),
        );
        state.marks = Array.from({ length: puzzle.height }, (_, rowIndex) =>
          Array.from({ length: puzzle.width }, (_, col) => Boolean(data.marks?.[rowIndex]?.[col])),
        );
        state.activeColor = colorById[data.activeColor] ? data.activeColor : state.activeColor;
        state.paletteHidden = Boolean(data.paletteHidden);
        state.paletteButtonColor = colorById[data.paletteButtonColor] ? data.paletteButtonColor : state.activeColor;
        state.currentRow = Number.isInteger(data.currentRow) ? data.currentRow : null;
        state.currentCol = Number.isInteger(data.currentCol) ? data.currentCol : null;
        state.elapsedMs = Number.isFinite(data.elapsedMs) ? Math.max(0, data.elapsedMs) : 0;
      } catch (error) {
        storageRemove(storageKey);
      }
    }

    function resetPuzzle() {
      pushHistory();
      window.clearInterval(state.timerInterval);
      state.cells = Array.from({ length: puzzle.height }, () => Array(puzzle.width).fill(null));
      state.marks = Array.from({ length: puzzle.height }, () => Array(puzzle.width).fill(false));
      state.activeColor = puzzle.palette[0].id;
      state.paletteButtonColor = state.activeColor;
      state.isDrawing = false;
      state.moved = false;
      state.armedValue = null;
      state.isPaintingDrag = false;
      state.drawStart = null;
      state.drawAxis = null;
      state.gestureCellsBase = null;
      state.gestureMarksBase = null;
      state.gestureAxis = null;
      state.drawValue = null;
      state.markMode = false;
      state.markValue = true;
      state.holdTimer = null;
      window.clearTimeout(state.resolveTimer);
      state.resolveTimer = null;
      state.lastCell = null;
      state.showErrors = false;
      state.currentRow = null;
      state.currentCol = null;
      state.elapsedMs = 0;
      state.timerStartedAt = null;
      state.timerRunning = false;
      state.timerInterval = null;
      state.solved = false;
      clearClueDoneState();
      storageRemove(storageKey);
      renderPalette();
      update();
      startTimer();
    }

    function countErrors() {
      let errors = 0;
      state.cells.forEach((row, rowIndex) => {
        row.forEach((cell, colIndex) => {
          const solutionCell = puzzle.solution[rowIndex][colIndex];
          if (cell && cell !== "dot" && cell !== solutionCell) errors += 1;
          if (cell === "dot" && solutionCell) errors += 1;
        });
      });
      return errors;
    }

    function setMenuMode(mode) {
      const isReview = mode === "review" && !state.solved;
      const errors = countErrors();
      byId("cn-menu").classList.toggle("cn-menu--review", isReview);
      byId("cn-menu-main").style.display = isReview ? "none" : "grid";
      byId("cn-review-panel").classList.toggle("cn-open", isReview);
      byId("cn-menu-title-label").textContent = isReview ? "Review:" : "Game paused:";
      byId("cn-menu-time").textContent = isReview ? `${errors} error(s)` : formatElapsed(getElapsedMs());
      byId("cn-review-copy").textContent = `You have ${errors} error(s)`;
      byId("cn-show-errors").classList.toggle("cn-review-muted", errors === 0);
      byId("cn-clear-errors").classList.toggle("cn-review-muted", errors === 0);
      byId("cn-review").disabled = state.solved;
    }

    function openMenu() {
      pauseTimer();
      setMenuMode("main");
      byId("cn-menu-backdrop").classList.add("cn-open");
    }

    function closeMenu() {
      byId("cn-menu-backdrop").classList.remove("cn-open");
      setMenuMode("main");
      startTimer();
    }

    function clearErrors() {
      pushHistory();
      state.cells.forEach((row, rowIndex) => {
        row.forEach((cell, colIndex) => {
          const solutionCell = puzzle.solution[rowIndex][colIndex];
          if (cell && cell !== "dot" && cell !== solutionCell) state.cells[rowIndex][colIndex] = null;
          if (cell === "dot" && solutionCell) state.cells[rowIndex][colIndex] = null;
        });
      });
      state.showErrors = false;
      update();
      setMenuMode("review");
    }

    function showHint() {
      for (let row = 0; row < puzzle.height; row += 1) {
        for (let col = 0; col < puzzle.width; col += 1) {
          const solutionCell = puzzle.solution[row][col];
          if (solutionCell && state.cells[row][col] !== solutionCell) {
            pushHistory();
            state.cells[row][col] = solutionCell;
            setPointerCell(row, col);
            update();
            setMenuMode("review");
            return;
          }
        }
      }
    }

    byId("cn-menu-toggle").addEventListener("click", openMenu);

    root.querySelector(".cn-tool--palette").addEventListener("click", togglePalette);

    byId("cn-mark-mode").addEventListener("click", () => {
      if (state.solved) return;
      if (state.markMode) {
        byId("cn-mark-backdrop").classList.add("cn-open");
        return;
      }
      state.markMode = true;
      renderModeButton();
      saveProgress();
    });

    byId("cn-exit-mark-mode").addEventListener("click", () => {
      state.markMode = false;
      byId("cn-mark-backdrop").classList.remove("cn-open");
      renderModeButton();
      saveProgress();
    });

    byId("cn-clear-marks").addEventListener("click", () => {
      state.marks = Array.from({ length: puzzle.height }, () => Array(puzzle.width).fill(false));
      byId("cn-mark-backdrop").classList.remove("cn-open");
      update();
    });

    byId("cn-cancel-mark-menu").addEventListener("click", () => {
      byId("cn-mark-backdrop").classList.remove("cn-open");
    });

    byId("cn-mark-backdrop").addEventListener("click", (event) => {
      if (event.target === byId("cn-mark-backdrop")) byId("cn-mark-backdrop").classList.remove("cn-open");
    });

    byId("cn-close-menu-main").addEventListener("click", closeMenu);
    byId("cn-close-menu").addEventListener("click", closeMenu);

    byId("cn-menu-backdrop").addEventListener("click", (event) => {
      if (event.target === byId("cn-menu-backdrop")) {
        closeMenu();
      }
    });

    byId("cn-restart").addEventListener("click", () => {
      resetPuzzle();
      byId("cn-menu-backdrop").classList.remove("cn-open");
      setMenuMode("main");
    });

    byId("cn-review").addEventListener("click", () => {
      if (state.solved) return;
      setMenuMode("review");
    });
    byId("cn-show-errors").addEventListener("click", () => {
      state.showErrors = true;
      update();
      setMenuMode("review");
    });
    byId("cn-clear-errors").addEventListener("click", clearErrors);
    byId("cn-show-hint").addEventListener("click", showHint);
    byId("cn-undo").addEventListener("click", undo);
    byId("cn-redo").addEventListener("click", redo);
    byId("cn-back").addEventListener("click", () => {
      if (currentView === "game") {
        showPack(currentPack.id);
        return;
      }
      if (currentView === "pack") {
        showLibrary();
        return;
      }
      showGame();
    });

    byId("cn-close-pack-settings").addEventListener("click", closePackSettings);

    byId("cn-pack-settings-backdrop").addEventListener("click", (event) => {
      if (event.target === byId("cn-pack-settings-backdrop")) {
        closePackSettings();
      }
    });

    byId("cn-restart-pack").addEventListener("click", () => {
      selectedPackForSettings.puzzles.forEach((nextPuzzle) => storageRemove(`color-nonogram:${nextPuzzle.id}`));
      closePackSettings();
      if (selectedPackForSettings.id === currentPack.id) {
        const stillCurrent = selectedPackForSettings.puzzles.some((nextPuzzle) => nextPuzzle.id === puzzle.id);
        if (stillCurrent) {
          resetRuntimeState();
          renderPalette();
          renderIndexLabels();
          updateHistoryButtons();
          update();
        }
      }
      renderLibrary();
      renderPack(currentPack);
    });

    byId("cn-archive-pack").addEventListener("click", () => {
      archivedPacks.add(selectedPackForSettings.id);
      storageSet("color-nonogram:archived-packs", JSON.stringify([...archivedPacks]));
      closePackSettings();
      showLibrary();
    });

    byId("cn-board").addEventListener("pointerdown", (event) => {
      const cell = cellFromPoint(event);
      if (!cell || state.solved) return;
      event.preventDefault();
      event.currentTarget.setPointerCapture?.(event.pointerId);
      state.pointerId = event.pointerId;
      state.isDrawing = true;
      state.moved = false;
      state.changedDuringGesture = false;
      state.isPaintingDrag = false;
      const anchor = {
        row: state.currentRow === null ? cell.row : state.currentRow,
        col: state.currentCol === null ? cell.col : state.currentCol,
      };
      if (state.currentRow === null || state.currentCol === null) setPointerCell(anchor.row, anchor.col);
      state.drawStart = anchor;
      state.drawAxis = null;
      state.gestureAxis = null;
      state.gestureCellsBase = null;
      state.gestureMarksBase = null;
      state.drawValue = undefined;
      state.lastCell = anchor;
      state.startX = event.clientX;
      state.startY = event.clientY;
      window.clearTimeout(state.holdTimer);
      window.clearTimeout(state.resolveTimer);
      state.resolveTimer = null;
      state.holdTimer = window.setTimeout(() => {
        if (!state.isDrawing || state.moved || state.solved) return;
        state.isPaintingDrag = true;
        state.showErrors = false;
        if (state.markMode) {
          state.gestureMarksBase = cloneMarks();
          state.markValue = !state.marks[anchor.row][anchor.col];
          markPath(anchor, anchor);
          return;
        }
        pushHistory();
        state.gestureCellsBase = cloneCells();
        state.drawValue = nextCellValue(state.cells[anchor.row][anchor.col]);
        state.armedValue = state.drawValue;
        paintPath(anchor, anchor);
      }, 260);
    });

    byId("cn-board").addEventListener("pointermove", (event) => {
      if (!state.isDrawing) return;
      if (!state.drawStart) return;
      event.preventDefault();
      const distance = Math.hypot(event.clientX - state.startX, event.clientY - state.startY);
      if (distance > 6) {
        state.moved = true;
        if (!state.isPaintingDrag) {
          window.clearTimeout(state.holdTimer);
          const cell = freeCellFromPointer(event, state.drawStart);
          moveCross(cell.row, cell.col);
          return;
        }
        if (!state.gestureAxis) {
          state.gestureAxis = dominantAxis(event);
          if (!state.gestureAxis) return;
        }
        const cell = relativeCellFromPointer(event, state.drawStart);
        if (state.markMode) markPath(state.lastCell, cell);
        else paintPath(state.lastCell, cell);
        return;
      }
    });

    window.addEventListener("pointerup", (event) => {
      window.clearTimeout(state.holdTimer);
      if (state.pointerId !== null && event.pointerId !== state.pointerId) return;
      if (state.isDrawing && !state.moved && !state.isPaintingDrag && state.drawStart && !state.solved) {
        const targetRow = state.currentRow === null ? state.drawStart.row : state.currentRow;
        const targetCol = state.currentCol === null ? state.drawStart.col : state.currentCol;
        handleTap(targetRow, targetCol);
      }
      const shouldResolveLines = state.changedDuringGesture;
      state.isDrawing = false;
      state.moved = false;
      state.changedDuringGesture = false;
      state.isPaintingDrag = false;
      state.drawStart = null;
      state.drawAxis = null;
      state.gestureCellsBase = null;
      state.gestureMarksBase = null;
      state.gestureAxis = null;
      state.drawValue = null;
      state.markValue = true;
      state.lastCell = null;
      state.pointerId = null;
      if (shouldResolveLines) scheduleLineResolution();
    });

    loadProgress();
    renderPalette();
    renderIndexLabels();
    renderLibrary();
    renderPack(currentPack);
    updateHistoryButtons();
    update();
    setView("game");
    window.setTimeout(() => window.scrollTo(0, 1), 250);
    } catch (error) {
      const root = document.getElementById("cn-game");
      if (root) {
        root.insertAdjacentHTML(
          "beforeend",
          `<pre style="position:fixed;left:8px;right:8px;bottom:8px;z-index:99999;margin:0;padding:8px;background:#fff;color:#b00020;font:12px monospace;white-space:pre-wrap">${String(error?.stack || error)}</pre>`,
        );
      }
      throw error;
    }
  })();
</script>

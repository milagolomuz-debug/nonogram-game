<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#6f9192">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600&display=swap" rel="stylesheet">
<style>
  html,
  body {
    margin: 0;
    padding: 0;
    background: #e4eeee;
  }

  #cn-game {
    color-scheme: light;
    --cn-bg: #e4eeee;
    --cn-game-bg: #f7f4ee;
    --cn-ink: #202124;
    --cn-muted: #74716b;
    --cn-line: #9a9a9a;
    --cn-major-line: #555555;
    --cn-minor-stroke: 1px;
    --cn-major-stroke: 1.5px;
    --cn-outer-stroke: 1.5px;
    --cn-panel: #fffdf8;
    --cn-accent: #ffa389;
    --cn-highlight: #6B51FF;
    --cn-highlight-stroke: 1px;
    --cn-cols: 25;
    --cn-rows: 35;
    --cn-clue-cols: 8;
    --cn-clue-rows: 11;
    --cn-cell: 11px;
    --cn-board-w: 363px;
    --cn-board-h: 506px;
    --cn-grid-w: 275px;
    --cn-grid-h: 385px;
    --cn-clue-left: 88px;
    --cn-clue-top: 121px;
    width: 100%;
    min-height: 852px;
    background: var(--cn-bg);
    color: var(--cn-ink);
    font-family: "Montserrat", sans-serif;
    font-weight: 500;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }

  #cn-game * {
    box-sizing: border-box;
    font-family: "Montserrat", sans-serif;
  }

  #cn-game button {
    font: inherit;
    -webkit-tap-highlight-color: transparent;
  }

  #cn-game .cn-app {
    width: 393px;
    height: 852px;
    max-width: 100vw;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    background: var(--cn-bg);
  }

  #cn-game .cn-toolbar {
    position: absolute;
    left: 0;
    top: 72px;
    width: 100%;
    height: 62px;
    display: block;
    background: var(--cn-accent);
    padding: 0;
    z-index: 10;
  }

  #cn-game .cn-tool {
    position: absolute;
    top: 16px;
    width: 30px;
    height: 30px;
    border: 0;
    border-radius: 0;
    background: transparent;
    color: #fff;
    font-size: 27px;
    font-weight: 800;
    line-height: 1;
    opacity: 0.96;
    cursor: pointer;
    padding: 0;
    display: grid;
    place-items: center;
  }

  #cn-game .cn-tool--back {
    left: 15.37px;
  }

  #cn-game .cn-tool--undo {
    left: 81.82px;
  }

  #cn-game .cn-tool--redo {
    left: 148.28px;
  }

  #cn-game .cn-tool--mode {
    left: 214.73px;
  }

  #cn-game .cn-tool--palette {
    left: 281.18px;
  }

  #cn-game .cn-tool--menu {
    left: 347.64px;
  }

  #cn-game .cn-tool.cn-muted {
    opacity: 0.42;
  }

  #cn-game .cn-tool:disabled,
  #cn-game .cn-app.cn-solved[data-view="game"] .cn-tool:not(.cn-tool--back):not(.cn-tool--menu) {
    opacity: 0.42;
    pointer-events: none;
  }

  #cn-game .cn-tool img,
  #cn-game .cn-tool svg {
    display: block;
    width: 22px;
    height: 22px;
    object-fit: contain;
    pointer-events: none;
  }

  #cn-game .cn-play-area {
    position: absolute;
    left: 0;
    top: 134px;
    width: 100%;
    height: 578px;
    display: grid;
    place-items: center;
    padding-top: 0;
    background: var(--cn-game-bg);
  }

  #cn-game .cn-board-wrap {
    width: var(--cn-board-w);
    height: var(--cn-board-h);
    display: grid;
    grid-template-columns: var(--cn-clue-left) var(--cn-grid-w);
    grid-template-rows: var(--cn-clue-top) var(--cn-grid-h);
    justify-content: start;
    overflow: visible;
    touch-action: none;
    position: relative;
  }

  #cn-game .cn-board-wrap::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 7;
    background:
      linear-gradient(var(--cn-major-line), var(--cn-major-line)) var(--cn-clue-left) 0 / calc(100% - var(--cn-clue-left)) var(--cn-outer-stroke) no-repeat,
      linear-gradient(var(--cn-major-line), var(--cn-major-line)) 0 var(--cn-clue-top) / var(--cn-outer-stroke) calc(100% - var(--cn-clue-top)) no-repeat,
      linear-gradient(var(--cn-major-line), var(--cn-major-line)) right top / var(--cn-outer-stroke) 100% no-repeat,
      linear-gradient(var(--cn-major-line), var(--cn-major-line)) left bottom / 100% var(--cn-outer-stroke) no-repeat;
  }

  #cn-game .cn-cross-row,
  #cn-game .cn-cross-col {
    display: none;
    position: absolute;
    border: var(--cn-highlight-stroke) solid var(--cn-highlight);
    pointer-events: none;
    z-index: 8;
    transition:
      top 170ms cubic-bezier(0.22, 0.86, 0.28, 1),
      left 170ms cubic-bezier(0.22, 0.86, 0.28, 1);
    will-change: top, left;
  }

  #cn-game .cn-cross-row {
    left: calc(var(--cn-highlight-stroke) * -1);
    width: calc(100% + var(--cn-highlight-stroke) * 2);
    height: calc(var(--cn-cell) + var(--cn-highlight-stroke) * 2);
  }

  #cn-game .cn-cross-col {
    top: calc(var(--cn-highlight-stroke) * -1);
    width: calc(var(--cn-cell) + var(--cn-highlight-stroke) * 2);
    height: calc(100% + var(--cn-highlight-stroke) * 2);
  }

  #cn-game .cn-bottom-numbers,
  #cn-game .cn-side-numbers {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 6;
    color: #111;
    font-size: 6px;
    font-weight: 850;
    line-height: 1;
  }

  #cn-game .cn-index-label {
    position: absolute;
    min-width: 10px;
    text-align: center;
  }

  #cn-game .cn-cross-count {
    display: none;
    position: absolute;
    min-width: 9px;
    height: 9px;
    padding: 0 1px;
    box-sizing: border-box;
    place-items: center;
    background: #fffaf0;
    color: #111;
    font-size: 7px;
    font-weight: 850;
    line-height: 1;
    pointer-events: none;
    z-index: 11;
    transition:
      top 130ms cubic-bezier(0.2, 0.8, 0.2, 1),
      left 130ms cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  #cn-game .cn-corner {
    box-shadow:
      inset calc(var(--cn-major-stroke) * -1) 0 0 var(--cn-major-line),
      inset 0 calc(var(--cn-major-stroke) * -1) 0 var(--cn-major-line);
  }

  #cn-game .cn-col-clues {
    display: grid;
    grid-template-columns: repeat(var(--cn-cols), var(--cn-cell));
    position: relative;
    background:
      repeating-linear-gradient(
        to right,
        transparent 0 calc(var(--cn-cell) - var(--cn-minor-stroke)),
        rgba(154, 154, 154, 0.28) calc(var(--cn-cell) - var(--cn-minor-stroke)) var(--cn-cell)
      ),
      var(--cn-game-bg);
    box-shadow: inset 0 calc(var(--cn-major-stroke) * -1) 0 var(--cn-major-line);
  }

  #cn-game .cn-row-clues {
    display: grid;
    grid-template-rows: repeat(var(--cn-rows), var(--cn-cell));
    position: relative;
    background:
      repeating-linear-gradient(
        to bottom,
        transparent 0 calc(var(--cn-cell) - var(--cn-minor-stroke)),
        rgba(154, 154, 154, 0.28) calc(var(--cn-cell) - var(--cn-minor-stroke)) var(--cn-cell)
      ),
      var(--cn-game-bg);
    box-shadow: inset calc(var(--cn-major-stroke) * -1) 0 0 var(--cn-major-line);
  }

  #cn-game .cn-col-clues::after,
  #cn-game .cn-row-clues::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 4;
  }

  #cn-game .cn-col-clues::after {
    background-image:
      repeating-linear-gradient(
        to right,
        transparent 0 calc(var(--cn-cell) * 5 - var(--cn-major-stroke)),
        var(--cn-major-line) calc(var(--cn-cell) * 5 - var(--cn-major-stroke)) calc(var(--cn-cell) * 5)
      );
  }

  #cn-game .cn-row-clues::after {
    background-image:
      repeating-linear-gradient(
        to bottom,
        transparent 0 calc(var(--cn-cell) * 5 - var(--cn-major-stroke)),
        var(--cn-major-line) calc(var(--cn-cell) * 5 - var(--cn-major-stroke)) calc(var(--cn-cell) * 5)
      );
  }

  #cn-game .cn-grid {
    display: grid;
    grid-template-columns: repeat(var(--cn-cols), var(--cn-cell));
    grid-template-rows: repeat(var(--cn-rows), var(--cn-cell));
    background: #fffaf0;
    position: relative;
    overflow: hidden;
    box-shadow:
      inset calc(var(--cn-major-stroke) * -1) 0 0 var(--cn-major-line),
      inset 0 calc(var(--cn-major-stroke) * -1) 0 var(--cn-major-line);
  }

  #cn-game .cn-grid::before,
  #cn-game .cn-grid::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  #cn-game .cn-grid::before {
    z-index: 3;
    background-image:
      repeating-linear-gradient(
        to right,
        transparent 0 calc(var(--cn-cell) - var(--cn-minor-stroke)),
        var(--cn-line) calc(var(--cn-cell) - var(--cn-minor-stroke)) var(--cn-cell)
      ),
      repeating-linear-gradient(
        to bottom,
        transparent 0 calc(var(--cn-cell) - var(--cn-minor-stroke)),
        var(--cn-line) calc(var(--cn-cell) - var(--cn-minor-stroke)) var(--cn-cell)
      );
  }

  #cn-game .cn-grid::after {
    z-index: 4;
    background-image:
      repeating-linear-gradient(
        to right,
        transparent 0 calc(var(--cn-cell) * 5 - var(--cn-major-stroke)),
        var(--cn-major-line) calc(var(--cn-cell) * 5 - var(--cn-major-stroke)) calc(var(--cn-cell) * 5)
      ),
      repeating-linear-gradient(
        to bottom,
        transparent 0 calc(var(--cn-cell) * 5 - var(--cn-major-stroke)),
        var(--cn-major-line) calc(var(--cn-cell) * 5 - var(--cn-major-stroke)) calc(var(--cn-cell) * 5)
      );
  }

  #cn-game .cn-app.cn-solved[data-view="game"] .cn-play-area {
    display: block;
    place-items: unset;
  }

  #cn-game .cn-app.cn-solved[data-view="game"] .cn-board-wrap {
    position: absolute;
    left: 50%;
    top: 131px;
    width: var(--cn-solved-w);
    height: var(--cn-solved-h);
    display: block;
    overflow: hidden;
    border: 1px solid #4a6f73;
    border-radius: 14px;
    transform: translateX(-50%);
  }

  #cn-game .cn-app.cn-solved[data-view="game"] .cn-board-wrap::before,
  #cn-game .cn-app.cn-solved[data-view="game"] .cn-corner,
  #cn-game .cn-app.cn-solved[data-view="game"] .cn-col-clues,
  #cn-game .cn-app.cn-solved[data-view="game"] .cn-row-clues,
  #cn-game .cn-app.cn-solved[data-view="game"] .cn-cross-row,
  #cn-game .cn-app.cn-solved[data-view="game"] .cn-cross-col,
  #cn-game .cn-app.cn-solved[data-view="game"] .cn-cross-count,
  #cn-game .cn-app.cn-solved[data-view="game"] .cn-bottom-numbers,
  #cn-game .cn-app.cn-solved[data-view="game"] .cn-side-numbers {
    display: none !important;
  }

  #cn-game .cn-app.cn-solved[data-view="game"] .cn-grid {
    width: var(--cn-solved-w);
    height: var(--cn-solved-h);
    display: grid;
    grid-template-columns: repeat(var(--cn-cols), var(--cn-solved-cell));
    grid-template-rows: repeat(var(--cn-rows), var(--cn-solved-cell));
    overflow: hidden;
    box-shadow: none;
    border-radius: inherit;
  }

  #cn-game .cn-app.cn-solved[data-view="game"] .cn-grid::before,
  #cn-game .cn-app.cn-solved[data-view="game"] .cn-grid::after,
  #cn-game .cn-app.cn-solved[data-view="game"] .cn-cell::before,
  #cn-game .cn-app.cn-solved[data-view="game"] .cn-cell::after {
    display: none;
  }

  #cn-game .cn-app.cn-solved[data-view="game"] .cn-cell {
    width: var(--cn-solved-cell);
    height: var(--cn-solved-cell);
    pointer-events: none;
    transition: none;
  }

  #cn-game .cn-clue-row,
  #cn-game .cn-clue-col {
    display: flex;
    gap: 0;
    padding: 0;
    color: var(--cn-ink);
  }

  #cn-game .cn-clue-row {
    align-items: center;
    justify-content: flex-end;
    min-width: 0;
    min-height: var(--cn-cell);
  }

  #cn-game .cn-clue-col {
    height: 100%;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    min-width: var(--cn-cell);
    min-height: 0;
  }

  #cn-game .cn-clue-col .cn-chip:last-child {
    margin-bottom: 0;
  }

  #cn-game .cn-chip {
    width: var(--cn-cell);
    height: var(--cn-cell);
    border: 0;
    border-radius: 0;
    display: grid;
    place-items: center;
    color: #111;
    font-size: 8px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0;
    position: relative;
    z-index: 2;
  }

  #cn-game .cn-chip.cn-two-digit {
    font-size: 6.2px;
    font-weight: 900;
  }

  #cn-game .cn-chip.cn-done {
    background: transparent !important;
    color: var(--cn-clue-color) !important;
    text-decoration: none;
  }

  #cn-game .cn-cell {
    width: var(--cn-cell);
    height: var(--cn-cell);
    box-sizing: border-box;
    border: 0;
    border-radius: 0;
    padding: 0;
    appearance: none;
    -webkit-appearance: none;
    background: #fffaf0;
    cursor: pointer;
    display: block;
    position: relative;
    z-index: 1;
    transition:
      transform 80ms ease,
      background 80ms ease,
      box-shadow 80ms ease;
  }

  #cn-game .cn-cell.cn-major-right {
    border-right: 0;
  }

  #cn-game .cn-cell.cn-major-bottom {
    border-bottom: 0;
  }

  #cn-game .cn-cell.cn-major-right.cn-major-bottom {
    border-right: 0;
    border-bottom: 0;
  }

  #cn-game .cn-cell:active {
    transform: none;
  }

  #cn-game .cn-cell.cn-hot {
    outline: 1px solid var(--cn-highlight);
    outline-offset: -1px;
  }

  #cn-game .cn-cell.cn-line-hot:not(.cn-hot) {
    box-shadow: none;
  }

  #cn-game .cn-cell.cn-dot {
    background: #fffaf0 !important;
  }

  #cn-game .cn-cell.cn-dot::before {
    content: "";
    position: absolute;
    inset: 0;
    margin: auto;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #626262;
    z-index: 2;
  }

  #cn-game .cn-cell.cn-mark::after {
    content: "";
    position: absolute;
    inset: 0;
    margin: auto;
    width: 7px;
    height: 7px;
    border: 1.4px solid #0d0d0d;
    border-radius: 50%;
    box-sizing: border-box;
    background: transparent;
    z-index: 3;
  }

  #cn-game .cn-cell.cn-filled.cn-mark::after {
    border-color: #fffaf0;
  }

  #cn-game .cn-cell.cn-light-filled.cn-mark::after {
    border-color: #0d0d0d;
  }

  #cn-game .cn-cell.cn-wrong {
    box-shadow: inset 0 0 0 3px rgba(196, 55, 42, 0.72);
  }

  #cn-game .cn-cell.cn-reveal {
    animation: cn-pop 190ms cubic-bezier(0.18, 0.9, 0.22, 1) both;
    animation-delay: calc(var(--cn-i) * 5ms);
  }

  #cn-game .cn-cell.cn-just-changed {
    animation: cn-cell-settle 120ms ease-out both;
  }

  @keyframes cn-cell-settle {
    from {
      opacity: 0.62;
    }
    to {
      opacity: 1;
    }
  }

  @keyframes cn-pop {
    0% {
      transform: scale(0.9);
      filter: brightness(1);
    }
    55% {
      transform: scale(1.08);
      filter: brightness(1.18);
    }
    100% {
      transform: scale(1);
      filter: brightness(1);
    }
  }

  #cn-game .cn-palette {
    position: absolute;
    left: 0;
    top: 712px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--cn-accent);
    width: 100%;
    height: 58px;
    padding: 0 0 8px;
    overflow: hidden;
  }

  #cn-game .cn-palette-items {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 35px;
    width: 100%;
    height: 100%;
    transition: transform 220ms ease, opacity 180ms ease;
    will-change: transform, opacity;
  }

  #cn-game .cn-palette.cn-hidden {
    pointer-events: none;
  }

  #cn-game .cn-palette.cn-hidden .cn-palette-items {
    opacity: 0;
    transform: translateY(44px);
  }

  #cn-game .cn-palette.cn-solved-nav {
    padding: 0 24px 8px;
  }

  #cn-game .cn-palette.cn-solved-nav .cn-palette-items {
    justify-content: space-between;
    gap: 0;
  }

  #cn-game .cn-solved-nav-button {
    width: auto;
    height: 42px;
    border: 0;
    border-radius: 0;
    background: transparent;
    color: #fffaf0;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0;
  }

  #cn-game .cn-solved-nav-button:disabled {
    opacity: 0.42;
    cursor: default;
  }

  #cn-game .cn-solved-nav-button svg {
    width: 13px;
    height: 22px;
    display: block;
  }

  #cn-game .cn-swatch {
    width: 15.33px;
    height: 15.33px;
    border: 0;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: none;
  }

  #cn-game .cn-swatch.cn-active {
    outline: 10px solid #fff;
    outline-offset: 0;
    box-shadow: none;
  }

  #cn-game .cn-solved-info {
    position: absolute;
    left: 0;
    right: 0;
    top: 224px;
    z-index: 9;
    display: none;
    text-align: center;
    color: #4a6f73;
    pointer-events: none;
  }

  #cn-game .cn-app.cn-solved[data-view="game"] .cn-solved-info {
    display: block;
    animation: cn-solved-info-in 180ms ease-out 430ms both;
  }

  #cn-game .cn-solved-title {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  #cn-game .cn-solved-status {
    margin: 380px 0 0;
    font-size: 20px;
    font-weight: 600;
    line-height: 1.1;
  }

  #cn-game .cn-solved-copy {
    margin: 22px 0 0;
    font-size: 15px;
    font-weight: 500;
    line-height: 1.2;
  }

  #cn-game .cn-solved-axis {
    position: absolute;
    z-index: 10;
    display: none;
    color: #111;
    font-size: 6px;
    font-weight: 850;
    line-height: 1;
    pointer-events: none;
  }

  #cn-game .cn-app.cn-solved[data-view="game"] .cn-solved-axis {
    display: block;
  }

  #cn-game .cn-solved-axis--right {
    top: calc(131px + var(--cn-solved-h) * 0.7);
    left: calc(50% + var(--cn-solved-w) / 2 + 76px);
  }

  #cn-game .cn-solved-axis--bottom {
    top: 570px;
    left: 50%;
    transform: translateX(-50%);
  }

  @keyframes cn-solved-info-in {
    from {
      opacity: 0;
      transform: translateY(6px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  #cn-game .cn-menu-backdrop {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 0;
    background: rgba(0, 0, 0, 0.3);
    z-index: 20;
  }

  #cn-game .cn-menu-backdrop.cn-open {
    display: flex;
  }

  #cn-game .cn-menu {
    width: 284px;
    height: 300px;
    position: relative;
    border-radius: 26.667px;
    background: #f6f4ed;
    box-shadow: 0 1.333px 1.333px rgba(0, 0, 0, 0.25);
    padding: 0;
  }

  #cn-game .cn-menu.cn-menu--review {
    height: 326px;
  }

  #cn-game .cn-menu::before {
    content: none;
  }

  #cn-game .cn-menu-title {
    position: absolute;
    top: 36px;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 9px;
    margin: 0;
    color: #4a6f73;
    font-size: 13px;
    font-weight: 600;
    line-height: 1;
    text-align: center;
  }

  #cn-game .cn-menu-time {
    font-variant-numeric: tabular-nums;
  }

      paintEllipse(14.5, 27, 8, 10, "orange");
      paintEllipse(14.5, 34, 5, 7, "red");
      for (let row = 7; row <= 38; row += 1) {
        grid[row][14] = "black";
        grid[row][15] = "black";
      }
      for (let row = 13; row <= 28; row += 1) {
        if (row % 3 !== 1) {
          grid[row][12] = "black";
          grid[row][17] = "black";
        }
      }
      paintLine(42, 2, 27, "blue");
      paintLine(40, 5, 24, "red");
      paintVLine(3, 6, 16, "yellow");
      paintVLine(26, 6, 16, "yellow");

      for (let row = 0; row < height; row += 1) {
        if (!grid[row].some(Boolean)) grid[row][row % width] = row % 2 ? "black" : "green";
      }
      for (let col = 0; col < width; col += 1) {
        if (!grid.some((row) => row[col])) grid[col % height][col] = col % 2 ? "red" : "blue";
      }
      return grid;
    };

    const makeSolutionVariant = () => {
      const grid = makeSolution().map((row) => [...row]);
      grid.forEach((row, rowIndex) => {
        row.forEach((cell, colIndex) => {
          if (cell === "blue" && rowIndex % 3 === 0) row[colIndex] = "green";
          if (cell === "yellow" && colIndex % 4 === 0) row[colIndex] = "orange";
        });
      });
      return grid;
    };

    const basePalette = [
      { id: "blue", label: "B", color: "#4d94ea" },
      { id: "black", label: "K", color: "#000000" },
      { id: "yellow", label: "Y", color: "#ffe04f" },
      { id: "red", label: "R", color: "#f23c2f" },
      { id: "green", label: "G", color: "#74ee3b" },
      { id: "brown", label: "O", color: "#b47a1c" },
      { id: "orange", label: "O", color: "#eca258" },
    ];

    const builtInPacks = [
      {
        id: "test-pack-1",
        title: "Pack #1 | Test",
        puzzles: [
          { id: "test-25x35-v1", title: "The Pool", width: 25, height: 35, palette: basePalette.slice(0, 6), solution: makeSolution() },
          { id: "test-30x45-v1", title: "Test 30x45", width: 30, height: 45, palette: basePalette, solution: makeSolution30() },
        ],

    ];

    function normalizePack(pack, packIndex) {
      if (!pack || !Array.isArray(pack.puzzles) || pack.puzzles.length === 0) return null;
      const id = pack.id || `extra-pack-${packIndex + 1}`;
      const puzzles = pack.puzzles
        .filter((nextPuzzle) => nextPuzzle && Array.isArray(nextPuzzle.solution))
        .map((nextPuzzle, puzzleIndex) => ({
          ...nextPuzzle,
          id: nextPuzzle.id || `${id}-puzzle-${puzzleIndex + 1}`,
          title: nextPuzzle.title || `Puzzle #${puzzleIndex + 1}`,
          width: nextPuzzle.width || nextPuzzle.solution[0]?.length || 0,
          height: nextPuzzle.height || nextPuzzle.solution.length || 0,
          palette: nextPuzzle.palette || basePalette,
        }))
        .filter((nextPuzzle) => nextPuzzle.width > 0 && nextPuzzle.height > 0);
      if (puzzles.length === 0) return null;
      return {
        ...pack,
        id,
        title: pack.title || `Pack #${packIndex + 1}`,
        puzzles,
      };
    }

    function loadExtraPacks() {
      const helpers = {
        basePalette,
        makeSolution,
        makeSolution30,
        makeSolutionVariant,
      };
      const factoryPacks = (window.NONOGRAM_PACK_FACTORIES || []).flatMap((factory) => {
        if (typeof factory !== "function") return [];
        try {
          const result = factory(helpers);
          return Array.isArray(result) ? result : [];
        } catch (error) {
          console.warn("Nonogram pack factory failed", error);
          return [];
        }
      });
      const dataPacks = Array.isArray(window.NONOGRAM_EXTRA_PACKS) ? window.NONOGRAM_EXTRA_PACKS : [];
      return [...factoryPacks, ...dataPacks]
        .map((pack, index) => normalizePack(pack, builtInPacks.length + index))
        .filter(Boolean);
    }

    const extraPacks = loadExtraPacks();
    const packs = extraPacks.length ? [...extraPacks, ...builtInPacks] : builtInPacks;

    let currentPack = packs[0];
    let puzzle = currentPack.puzzles[0];

    const state = {
      activeColor: puzzle.palette[0].id,
      isDrawing: false,

      isPaintingDrag: false,
      drawStart: null,
      drawAxis: null,
      gestureCellsBase: null,
      gestureMarksBase: null,
      gestureAxis: null,
      drawValue: null,

      paletteHidden: false,
      paletteButtonColor: puzzle.palette[0].id,

      redoStack: [],

      startY: 0,

      timerRunning: false,
      timerInterval: null,

    const root = document.getElementById("cn-game");
    const app = root.querySelector(".cn-app");
    const byId = (id) => root.querySelector(`#${id}`);
    const markModeButton = byId("cn-mark-mode");
    const markModeDefaultIcon = markModeButton.innerHTML;
    const markModeActiveIcon = `<svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11 19.25C15.5563 19.25 19.25 15.5563 19.25 11C19.25 6.44365 15.5563 2.75 11 2.75C6.44365 2.75 2.75 6.44365 2.75 11C2.75 15.5563 6.44365 19.25 11 19.25Z" fill="#F6F4ED" stroke="#F6F4ED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 17C14.3137 17 17 14.3137 17 11C17 7.68629 14.3137 5 11 5C7.68629 5 5 7.68629 5 11C5 14.3137 7.68629 17 11 17Z" stroke="#4A6F73" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const paletteButton = root.querySelector(".cn-tool--palette");
    const paletteDefaultIcon = paletteButton.innerHTML;
    let colorById = Object.fromEntries(puzzle.palette.map((color) => [color.id, color]));
    let storageKey = `color-nonogram:${puzzle.id}`;

    function storageGet(key) {
      try {
        return window.localStorage.getItem(key);
      } catch (error) {
        return null;
      }
    }

    function storageSet(key, value) {
      try {
        window.localStorage.setItem(key, value);
      } catch (error) {
        // Standalone iOS/file previews can block storage; the game should still render.
      }
    }

    function storageRemove(key) {
      try {
        window.localStorage.removeItem(key);
      } catch (error) {
        // Ignore storage errors in standalone mode.
      }
    }

    function loadArchivedPackIds() {
      try {
        const ids = JSON.parse(storageGet("color-nonogram:archived-packs") || "[]");
        return new Set(Array.isArray(ids) ? ids : []);
      } catch (error) {
        return new Set();

    }

    const archivedPacks = loadArchivedPackIds();
    let currentView = "game";
    let selectedPackForSettings = currentPack;

    function emptyCells() {
      return Array.from({ length: puzzle.height }, () => Array(puzzle.width).fill(null));
    }

    function emptyMarks() {
      return Array.from({ length: puzzle.height }, () => Array(puzzle.width).fill(false));
    }

    function resetRuntimeState(options = {}) {
      window.clearTimeout(state.holdTimer);
      window.clearInterval(state.timerInterval);
      state.activeColor = puzzle.palette[0].id;
      state.isDrawing = false;
      state.moved = false;

      state.isPaintingDrag = false;
      state.drawStart = null;
      state.drawAxis = null;
      state.gestureCellsBase = null;
      state.gestureMarksBase = null;
      state.gestureAxis = null;
      state.drawValue = null;
      state.markMode = false;

      state.paletteButtonColor = state.activeColor;
      state.markValue = true;
      state.holdTimer = null;
      window.clearTimeout(state.resolveTimer);
      state.resolveTimer = null;
      if (state.updateFrame) cancelAnimationFrame(state.updateFrame);
      state.updateFrame = null;
      state.pendingUpdateOptions = null;
      state.renderedCellKeys = null;

      state.redoStack = [];
      state.pointerId = null;
      state.currentRow = null;

      state.timerStartedAt = null;
      state.timerRunning = false;
      state.timerInterval = null;
      state.cells = emptyCells();
      state.marks = emptyMarks();
      state.solved = false;
      clearClueDoneState();
    }

    function puzzleColorTotal(nextPuzzle) {
      return nextPuzzle.solution.reduce((total, row) => total + row.filter(Boolean).length, 0);
    }

    function progressFor(nextPuzzle) {
      const raw = storageGet(`color-nonogram:${nextPuzzle.id}`);
      const total = puzzleColorTotal(nextPuzzle);
      if (!raw) return { status: "new", elapsedMs: 0, filled: 0, total, ratio: 0 };
      try {
        const data = JSON.parse(raw);
        const filled = Array.isArray(data.cells)
          ? data.cells.flat().filter((cell) => cell && cell !== "dot").length
          : 0;
        const solved = Boolean(data.solved);
        const ratio = total ? Math.min(1, filled / total) : 0;
        return {
          status: solved ? "solved" : filled ? "saved" : "new",
          elapsedMs: Number.isFinite(data.elapsedMs) ? data.elapsedMs : 0,
          filled,
          total,
          ratio,
        };
      } catch (error) {
        return { status: "new", elapsedMs: 0, filled: 0, total, ratio: 0 };
      }
    }

    function packCounts(pack) {
      return pack.puzzles.reduce(
        (counts, nextPuzzle) => {
          counts[progressFor(nextPuzzle).status] += 1;
          return counts;
        },
        { new: 0, saved: 0, solved: 0 },
      );
    }

    function setView(view) {
      currentView = view;
      app.dataset.view = view;
      byId("cn-game-screen").classList.toggle("cn-open", view === "game");
      byId("cn-pack-screen").classList.toggle("cn-open", view === "pack");
      byId("cn-library-screen").classList.toggle("cn-open", view === "library");
      if (view === "game") startTimer();
      else pauseTimer();

    function paintPuzzlePreview(target, nextPuzzle) {
      target.textContent = "";
      target.classList.add("cn-pixel-preview");
      target.style.setProperty("--cn-preview-cols", nextPuzzle.width);
      target.style.setProperty("--cn-preview-rows", nextPuzzle.height);
      const previewColors = Object.fromEntries(nextPuzzle.palette.map((color) => [color.id, color.color]));
      nextPuzzle.solution.forEach((row) => {
        row.forEach((cell) => {
          const pixel = document.createElement("span");
          pixel.style.background = cell ? previewColors[cell] : "#fffaf0";
          target.appendChild(pixel);
        });
      });
    }

    function cardStatusLabel(status) {
      if (status === "saved") return "In progress";
      if (status === "solved") return "Solved";
      return "Not started";
    }

    function cardDifficulty(nextPuzzle, status, index) {
      if (nextPuzzle.difficulty) return nextPuzzle.difficulty;
      if (status === "saved" || nextPuzzle.width >= 30) return "Hard";
      return index % 5 === 0 ? "Medium" : "Medium";
    }

    function cardIcon(name) {
      if (name === "size") {
        return '<svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 10.5H1.5V14H5v-1.5H3.6l2.8-2.8-1.1-1.1L3 10.9v-.4ZM12.4 3.5H11V2h3.5v3.5H13V4.1l-2.8 2.8-1.1-1.1 3.3-2.3ZM3.6 3.5H5V2H1.5v3.5H3V4.1l2.8 2.8 1.1-1.1-3.3-2.3ZM12.4 12.5H11V14h3.5v-3.5H13v1.4l-2.8-2.8-1.1 1.1 3.3 2.3Z"/></svg>';
      }
      if (name === "time") {
        return '<svg viewBox="0 0 16 16" aria-hidden="true"><path d="M4 1h8v3.1L9.2 8 12 11.9V15H4v-3.1L6.8 8 4 4.1V1Zm2 2v.5l2 2.8 2-2.8V3H6Zm2 6.7-2 2.8v.5h4v-.5L8 9.7Z"/></svg>';
      }
      return '<svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 1.5 9.8 6 14.5 8 9.8 10 8 14.5 6.2 10 1.5 8 6.2 6 8 1.5Z"/></svg>';
    }

    function renderLibrary() {
      const list = byId("cn-library-list");
      list.textContent = "";
      packs
        .filter((pack) => !archivedPacks.has(pack.id))
        .forEach((pack) => {
          const counts = packCounts(pack);
          const card = document.createElement("button");
          card.className = "cn-library-card";
          card.type = "button";
          card.innerHTML = `
            <div class="cn-library-thumb" aria-hidden="true"></div>
            <div>
              <h2 class="cn-library-title">${pack.title}</h2>
              <p class="cn-library-meta">${counts.solved}/20 puzzles solved</p>
            </div>
            <span class="cn-pack-more" aria-label="Pack settings">&#8942;</span>
          `;
          paintPuzzlePreview(card.querySelector(".cn-library-thumb"), pack.puzzles[0] || puzzle);
          card.addEventListener("click", (event) => {
            if (event.target.closest(".cn-pack-more")) {
              event.stopPropagation();
              openPackSettings(pack, card);
              return;

          });
          list.appendChild(card);

    function renderPack(pack = currentPack) {
      const counts = packCounts(pack);
      const heroPuzzle = pack.puzzles[0] || puzzle;
      byId("cn-pack-title").textContent = pack.title;
      byId("cn-pack-stats").innerHTML = `
        <span class="cn-pack-stat cn-pack-stat--new"><span class="cn-pack-stat-count">${counts.new}</span> Not started</span>
        <span class="cn-pack-stat cn-pack-stat--saved"><span class="cn-pack-stat-count">${counts.saved}</span> In progress</span>
        <span class="cn-pack-stat cn-pack-stat--solved"><span class="cn-pack-stat-count">${counts.solved}</span> Solved</span>
      `;
      paintPuzzlePreview(byId("cn-pack-thumb"), heroPuzzle);
      const grid = byId("cn-pack-grid");
      grid.textContent = "";
      if (pack.puzzles.length === 0) {
        const empty = document.createElement("p");
        empty.className = "cn-pack-empty";
        empty.textContent = "No puzzles yet";
        grid.appendChild(empty);
        return;
      }
      for (let index = 0; index < pack.puzzles.length; index += 1) {
        const nextPuzzle = pack.puzzles[index];
        const progress = progressFor(nextPuzzle);
        const progressAmount = progress.status === "solved" ? 100 : Math.round(progress.ratio * 100);
        const card = document.createElement("button");
        card.className = `cn-puzzle-card cn-puzzle-card--${progress.status}`;
        card.type = "button";
        card.innerHTML = `
          <strong><span class="cn-puzzle-number">${index + 1}</span>${cardStatusLabel(progress.status)}</strong>
          <span class="cn-card-detail">${cardIcon("difficulty")}${cardDifficulty(nextPuzzle, progress.status, index)}</span>
          <span class="cn-card-detail">${cardIcon("size")}${nextPuzzle.width}x${nextPuzzle.height}</span>
          <span class="cn-card-detail">${cardIcon("time")}${formatElapsed(progress.elapsedMs)}</span>
          <span class="cn-card-progress" style="--cn-card-progress: ${progressAmount}%"></span>
        `;
        if (progress.status === "solved") {
          const thumb = document.createElement("div");
          thumb.className = "cn-card-thumb";
          thumb.setAttribute("aria-hidden", "true");
          paintPuzzlePreview(thumb, nextPuzzle);
          card.appendChild(thumb);
        }
        card.addEventListener("click", () => loadPuzzle(pack, nextPuzzle));
        grid.appendChild(card);
      }
    }

    function showLibrary() {
      renderLibrary();
      setView("library");
    }

    function closePackSettings() {
      byId("cn-pack-settings-backdrop").classList.remove("cn-open");
      document.querySelectorAll(".cn-library-card--active").forEach((card) => {
        card.classList.remove("cn-library-card--active");
      });
    }

    function openPackSettings(pack, anchor) {
      selectedPackForSettings = pack;
      const backdrop = byId("cn-pack-settings-backdrop");
      const panel = backdrop.querySelector(".cn-pack-settings");
      const rect = anchor.getBoundingClientRect();
      const appRect = app.getBoundingClientRect();
      const panelWidth = 284;
      const panelHeight = 152;
      const margin = 11;
      const gap = 28;
      const centerX = rect.left + rect.width / 2;
      const activeRowBottom = Math.max(rect.bottom, rect.top + 72);
      const left = Math.max(
        appRect.left + margin,
        Math.min(appRect.right - panelWidth - margin, centerX - panelWidth / 2),
      );
      const topBelow = activeRowBottom + gap;
      const topAbove = rect.top - panelHeight - gap;
      const useAbove = topBelow + panelHeight + margin > appRect.bottom && topAbove >= appRect.top + margin;
      const top = useAbove
        ? Math.max(appRect.top + margin, topAbove)
        : Math.min(appRect.bottom - panelHeight - margin, topBelow);
      const arrowLeft = Math.max(18, Math.min(panelWidth - 49, centerX - left - 15.5));

      closePackSettings();
      anchor.classList.add("cn-library-card--active");
      backdrop.style.setProperty("--cn-pack-settings-left", `${left}px`);
      backdrop.style.setProperty("--cn-pack-settings-top", `${top}px`);
      backdrop.style.setProperty("--cn-pack-settings-arrow-left", `${arrowLeft}px`);
      panel.classList.toggle("cn-pack-settings--above", useAbove);
      backdrop.classList.add("cn-open");
    }

    function showPack(packId = currentPack.id) {
      const nextPack = packs.find((pack) => pack.id === packId) || currentPack;
      currentPack = nextPack;
      selectedPackForSettings = nextPack;
      renderPack(nextPack);
      setView("pack");

    function showGame() {
      renderLibrary();
      renderPack(currentPack);
      setView("game");
